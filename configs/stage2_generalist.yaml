"""Stage 2: Generalist Fine-tuning Configuration

Key differences from Stage 1:
- In-batch negatives: OFF (prevents signal corruption on clustering/STS)
- Duration: 18k steps (~1.5 days on 2× A100 80GB)
- Resume from Stage 1 checkpoint
- Data: Stage 1 + 120k synthetic + 50k custom (Siemens, TensorRT, PRs)
- Lower learning rate: 1.5e-5
"""

training_args:
  num_train_epochs: 1
  per_device_train_batch_size: 16
  per_device_eval_batch_size: 32
  gradient_accumulation_steps: 4
  learning_rate: 1.5e-5
  warmup_steps: 500
  max_steps: 18000
  lr_scheduler_type: cosine
  weight_decay: 0.01
  max_grad_norm: 1.0
  logging_steps: 100
  save_steps: 1000
  eval_steps: 1000
  save_total_limit: 2
  fp16: true
  dataloader_num_workers: 4
  dataloader_pin_memory: true
  remove_unused_columns: false
  optim: adamw_torch

model_config:
  model_name: mistralai/Mistral-7B-v0.1
  use_lora: true
  lora_rank: 16
  lora_alpha: 32
  lora_dropout: 0.1

pooling_config:
  n_latents: 512
  num_heads: 8
  ffn_dim: 2048

loss_config:
  loss_type: mrl_infonce
  mrl_dims: [512, 1024, 2048, 4096]
  temperature: 0.07
  use_in_batch_negatives: false  # CRITICAL: OFF for generalist
  hard_negative_ratio: 0.5

data_config:
  train_files:
    - data/msmarco_train.jsonl
    - data/hotpotqa_train.jsonl
    - data/nq_train.jsonl
    - data/stackexchange_train.jsonl
    - data/beir_train.jsonl
    - data/miracl_train.jsonl
    - data/synthetic_stage2.jsonl  # 120k synthetic pairs
    - data/custom_siemens.jsonl    # 50k Siemens monoliths
    - data/custom_tensorrt.jsonl   # TensorRT docs
    - data/custom_prdiffs.jsonl    # PR diffs
  eval_files:
    - data/msmarco_dev.jsonl
    - data/custom_eval.jsonl
  max_seq_length: 512
  hard_negative_file: data/hard_negatives_stage2.pkl

deepspeed: configs/deepspeed_zero2.json
