# Generalist Fine-tuning Configuration
#
# Key differences from retrieval:
# - In-batch negatives: OFF (prevents signal corruption on clustering/STS)
# - Duration: 18k steps (~1.5 days on 2x A100 80GB)
# - Resume from retrieval checkpoint
# - Data: retrieval + synthetic + custom (55M target)
# - Lower learning rate: 1.5e-5
# - bf16 for better numerical stability

training_args:
  num_train_epochs: 1
  per_device_train_batch_size: 16
  per_device_eval_batch_size: 32
  gradient_accumulation_steps: 4
  learning_rate: 1.5e-5
  warmup_steps: 500
  max_steps: 18000
  lr_scheduler_type: cosine
  weight_decay: 0.01
  max_grad_norm: 1.0
  logging_steps: 100
  save_steps: 1000
  eval_steps: 1000
  save_total_limit: 3
  bf16: true
  gradient_checkpointing: true
  dataloader_num_workers: 4
  dataloader_pin_memory: true
  remove_unused_columns: false
  optim: adamw_torch
  # NOTE: Do NOT set resume_from_checkpoint here.
  # Stage chaining uses --model-path (CLI) to load trained weights into a fresh
  # optimizer/scheduler.  HF Trainer resume requires optimizer & trainer_state
  # files that our custom save_pretrained does not produce.

model_config:
  model_name: mistralai/Mistral-7B-v0.1
  use_lora: true
  lora_rank: 16
  lora_alpha: 32
  lora_dropout: 0.1
  output_dim: 4096

pooling_config:
  n_latents: 512
  num_heads: 8
  ffn_dim: 2048

loss_config:
  loss_type: mrl_infonce
  mrl_dims: [512, 1024, 2048, 4096]
  temperature: 0.07
  use_in_batch_negatives: false  # CRITICAL: OFF for generalist
  hard_negative_ratio: 0.5

data_config:
  data_path: data/stage2_55M
  multimodal_ratio: 0.3
  max_seq_length: 512
  hard_negative_file: data/hard_negatives_stage2.pkl

deepspeed: configs/deepspeed_zero2.json
