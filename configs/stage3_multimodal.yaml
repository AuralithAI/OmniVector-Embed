# Multimodal Alignment Configuration
#
# Joint text + vision + audio alignment training.
# Resumes from Stage 2 generalist checkpoint.
#
# Key settings:
# - Loss: MRLInfoNCE + CrossModalContrastive (weight 0.2)
# - Audio encoder: Whisper-tiny (384 -> 4096 projection)
# - All encoders unfrozen for end-to-end alignment
# - 12k steps (~1 day on 2x A100 80GB)
# - Target: image-text recall >= 0.75, audio-text recall >= 0.60

training_args:
  num_train_epochs: 1
  per_device_train_batch_size: 8
  per_device_eval_batch_size: 16
  gradient_accumulation_steps: 8
  learning_rate: 5.0e-6
  warmup_steps: 300
  max_steps: 12000
  lr_scheduler_type: cosine
  weight_decay: 0.01
  max_grad_norm: 1.0
  logging_steps: 50
  save_steps: 500
  eval_steps: 500
  save_total_limit: 3
  bf16: true
  gradient_checkpointing: true
  dataloader_num_workers: 4
  dataloader_pin_memory: true
  remove_unused_columns: false
  optim: adamw_torch
  # NOTE: Do NOT set resume_from_checkpoint here.
  # Stage chaining uses --text-checkpoint (CLI) to load trained weights into a
  # fresh optimizer/scheduler.  HF Trainer resume requires optimizer &
  # trainer_state files that our custom save_pretrained does not produce.

model_config:
  model_name: mistralai/Mistral-7B-v0.1
  use_lora: true
  lora_rank: 16
  lora_alpha: 32
  lora_dropout: 0.1
  output_dim: 4096
  mrl_dims: [512, 1024, 2048, 4096]

pooling_config:
  n_latents: 512
  num_heads: 8
  ffn_dim: 2048

vision_config:
  model_name: SigLIP-SO400M
  vision_dim: 1152
  embed_dim: 4096
  freeze_vision_backbone: false
  freeze_vision_steps: 0  # No freeze — fine-tune projection from start

audio_config:
  model_name: whisper-tiny
  encoder_dim: 384
  embed_dim: 4096
  freeze_encoder: false  # Fine-tune projection layer
  dropout: 0.1

loss_config:
  loss_type: mrl_infonce
  mrl_dims: [512, 1024, 2048, 4096]
  temperature: 0.07
  use_in_batch_negatives: false
  cross_modal_weight: 0.2  # CRITICAL: low weight for cross-modal alignment
  hard_negative_ratio: 0.5

modality_config:
  freeze_text: false
  freeze_vision: false
  freeze_audio: false
  text_weight: 1.0
  vision_weight: 0.2
  audio_weight: 0.2

data_config:
  data_path: data/stage3_multimodal
  text_data: data/stage2_55M/train.jsonl
  image_data: data/multimodal/image_text_pairs.jsonl
  image_dir: data/multimodal/images
  video_data: data/multimodal/video_text_pairs.jsonl
  video_dir: data/multimodal/videos
  audio_data: data/multimodal/audio_text_pairs.jsonl
  audio_dir: data/multimodal/audio
  multimodal_ratio: 0.5
  max_seq_length: 512

deepspeed: configs/deepspeed_zero2.json
