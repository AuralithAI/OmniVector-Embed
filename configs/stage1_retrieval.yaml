# Retrieval Training Configuration
#
# Duration: 20k steps (~2 days on 2x A100 80GB, ~1 day on H100)
# Effective batch: 128 (16/GPU x 4 grad_accum x 2 GPUs)
# Data: ~7-8M pairs (text retrieval + multimodal)
# Target: MSMARCO NDCG@10 >= 0.52, MTEB preview >= 65

training_args:
  num_train_epochs: 1
  per_device_train_batch_size: 16
  per_device_eval_batch_size: 32
  gradient_accumulation_steps: 4
  learning_rate: 2.0e-5
  warmup_steps: 1000
  max_steps: 20000
  lr_scheduler_type: cosine
  weight_decay: 0.01
  max_grad_norm: 1.0
  logging_steps: 100
  save_steps: 2000
  eval_steps: 2000
  save_total_limit: 3
  bf16: true
  dataloader_num_workers: 4
  dataloader_pin_memory: true
  remove_unused_columns: false
  optim: adamw_torch
  gradient_checkpointing: true
  metric_for_best_model: ndcg_at_10
  greater_is_better: true
  load_best_model_at_end: true

model_config:
  model_name: mistralai/Mistral-7B-v0.1
  use_lora: true
  lora_rank: 16
  lora_alpha: 32
  lora_dropout: 0.1

pooling_config:
  n_latents: 512
  num_heads: 8
  ffn_dim: 2048

loss_config:
  loss_type: mrl_infonce
  mrl_dims: [512, 1024, 2048, 4096]
  temperature: 0.07
  use_in_batch_negatives: true
  hard_negatives: 7
  positive_aware_threshold: 0.95

data_config:
  data_path: data/stage1_8M
  train_file: data/stage1_8M/train.jsonl
  eval_files:
    - data/msmarco_dev.jsonl
  max_seq_length: 512
  multimodal: true
  multimodal_ratio: 0.4

deepspeed: configs/deepspeed_zero2.json
