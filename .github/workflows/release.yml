# -----------------------------------------------------------------------
#  OmniVector-Embed — Release
#
#  Fires after CI passes on main (via workflow_run).
#    1. Auto-increment patch tag from git tags (v0.1.0 → v0.1.1)
#    2. Build sdist + wheel
#    3. Publish to PyPI via OIDC trusted publisher
#    4. Create GitHub Release with changelog + wheel assets
#
#  For major/minor bumps: manually push a tag, e.g. git tag v0.2.0
# -----------------------------------------------------------------------
name: Release

on:
  workflow_run:
    workflows: ["CI - Lint, Type Check, Test"]
    types: [completed]
    branches: [main]

permissions:
  contents: write
  id-token: write

env:
  PYTHON_DEFAULT: "3.10"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # -----------------------------------------------------------------
  #  1. Build
  # -----------------------------------------------------------------
  build:
    name: Build
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      should-release: ${{ steps.skip.outputs.should-release }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          fetch-tags: true

      - name: Skip bot commits
        id: skip
        run: |
          AUTHOR=$(git log -1 --pretty=format:'%an')
          MSG=$(git log -1 --pretty=format:'%s')
          if [[ "$AUTHOR" == "github-actions[bot]" ]] || [[ "$MSG" == *"[skip ci]"* ]]; then
            echo "should-release=false" >> "$GITHUB_OUTPUT"
            echo "Skipping — bot commit or [skip ci]"
          else
            echo "should-release=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-python@v5
        if: steps.skip.outputs.should-release == 'true'
        with:
          python-version: ${{ env.PYTHON_DEFAULT }}

      - name: Determine version
        if: steps.skip.outputs.should-release == 'true'
        id: version
        run: |
          # Auto-increment patch from the latest git tag
          LATEST=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -1)
          if [ -z "$LATEST" ]; then
            VERSION="0.1.0"
          else
            VER="${LATEST#v}"
            MAJOR=$(echo "$VER" | cut -d. -f1)
            MINOR=$(echo "$VER" | cut -d. -f2)
            PATCH=$(echo "$VER" | cut -d. -f3)
            VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"
          fi
          TAG="v${VERSION}"

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Version: ${VERSION}  Tag: ${TAG}"

      - name: Install build tools
        if: steps.skip.outputs.should-release == 'true'
        run: pip install build twine

      - name: Build sdist + wheel
        if: steps.skip.outputs.should-release == 'true'
        run: python -m build

      - name: Verify
        if: steps.skip.outputs.should-release == 'true'
        run: twine check dist/*

      - name: Upload artifacts
        if: steps.skip.outputs.should-release == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*
          retention-days: 5

  # -----------------------------------------------------------------
  #  2. Tag + Release + Publish
  # -----------------------------------------------------------------
  release:
    name: Release
    needs: build
    if: needs.build.outputs.should-release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          fetch-tags: true

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      # -- Update VERSION file + create tag --
      - name: Create tag
        run: |
          TAG="${{ needs.build.outputs.tag }}"
          VERSION="${{ needs.build.outputs.version }}"

          if git rev-parse "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists — skipping"
          else
            # Update VERSION file
            echo "${VERSION}" > VERSION
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add VERSION
            git commit -m "chore: bump version to ${VERSION} [skip ci]"
            git push origin main

            git tag -a "${TAG}" -m "Release ${TAG}"
            git push origin "${TAG}"
            echo "Created tag ${TAG}"
          fi

      # -- Publish to PyPI --
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
        continue-on-error: true

      # -- Create GitHub Release --
      - name: Generate changelog
        id: changelog
        run: |
          TAG="${{ needs.build.outputs.tag }}"
          PREV_TAG=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | grep -v "^${TAG}$" | head -1)

          {
            echo "## What's Changed"
            echo ""
            if [ -n "$PREV_TAG" ]; then
              git log "${PREV_TAG}..HEAD" --pretty=format:"- %s (%h)" --no-merges 2>/dev/null | head -30 || true
            else
              echo "Initial release 🎉"
            fi
            echo ""
            echo ""
            echo "---"
            echo ""
            echo "### 📥 Install"
            echo '```bash'
            echo "pip install omnivector-embed==${{ needs.build.outputs.version }}"
            echo '```'
          } > /tmp/changelog.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build.outputs.tag }}
          name: "v${{ needs.build.outputs.version }}"
          body_path: /tmp/changelog.md
          draft: false
          prerelease: false
          files: dist/*
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
