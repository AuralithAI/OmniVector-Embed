name: Release - Version Tag and Publish

on:
  push:
    branches: [main]
    paths:
      - 'VERSION'

jobs:
  check-version-change:
    name: Check Version Change
    runs-on: ubuntu-latest
    outputs:
      version-changed: ${{ steps.check.outputs.version-changed }}
      new-version: ${{ steps.check.outputs.new-version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check if VERSION file changed
        id: check
        run: |
          set +e  # Don't exit on error
          
          # Try to get VERSION from previous commit
          # If it doesn't exist (new file) or differs, mark as changed
          OLD_VERSION=$(git show HEAD~1:VERSION 2>/dev/null)
          NEW_VERSION=$(cat VERSION)
          
          # If old version doesn't exist or differs from new version, version changed
          if [ -z "$OLD_VERSION" ] || [ "$NEW_VERSION" != "$OLD_VERSION" ]; then
            echo "version-changed=true" >> $GITHUB_OUTPUT
            echo "new-version=$NEW_VERSION" >> $GITHUB_OUTPUT
          else
            echo "version-changed=false" >> $GITHUB_OUTPUT
          fi

  build:
    name: Build Package
    runs-on: ubuntu-latest
    needs: check-version-change
    if: needs.check-version-change.outputs.version-changed == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install build tools
        run: pip install build

      - name: Build package
        run: python -m build

      - name: Upload artifacts
        uses: actions/upload-artifact@v3
        with:
          name: dist
          path: dist/

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [check-version-change, build]
    if: needs.check-version-change.outputs.version-changed == 'true'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v3
        with:
          name: dist
          path: dist/

      - name: Create tag
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git tag "v${{ needs.check-version-change.outputs.new-version }}"
          git push origin "v${{ needs.check-version-change.outputs.new-version }}"

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: "v${{ needs.check-version-change.outputs.new-version }}"
          artifacts: "dist/*"
          artifactErrorsFailBuild: true
          generateReleaseNotes: true

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [check-version-change, build]
    if: needs.check-version-change.outputs.version-changed == 'true'
    environment:
      name: pypi
      url: https://pypi.org/p/omnivector-embed
    permissions:
      id-token: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v3
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
