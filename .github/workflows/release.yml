# -----------------------------------------------------------------------
#  OmniVector-Embed — Release
#
#  On every push to main:
#    1. Test (Python 3.10)
#    2. Build sdist + wheel
#    3. Auto-increment patch tag (v0.1.0 -> v0.1.1)
#    4. Publish to PyPI via OIDC trusted publisher
#    5. Create GitHub Release with changelog + wheel assets
#
#  For major/minor bumps: manually push a tag, e.g. git tag v0.2.0
# -----------------------------------------------------------------------
name: Release

on:
  push:
    branches: [main]
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"

permissions:
  contents: write
  id-token: write

env:
  PYTHON_DEFAULT: "3.10"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # -----------------------------------------------------------------
  #  1. Test
  # -----------------------------------------------------------------
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_DEFAULT }}

      - name: Install
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install torch==2.3.1 --index-url https://download.pytorch.org/whl/cpu
          pip install -e ".[test]"
          pip install pytest-timeout

      - name: Lint
        run: ruff check src/ tests/

      - name: Test
        run: pytest tests/unit/ -v --tb=short -m 'not slow' -x
        timeout-minutes: 15

  # -----------------------------------------------------------------
  #  2. Build
  # -----------------------------------------------------------------
  build:
    name: Build
    needs: test
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_DEFAULT }}

      - name: Determine version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
            VERSION="${TAG#v}"
          else
            LATEST=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -1)
            if [ -z "$LATEST" ]; then
              VERSION="0.1.0"
            else
              VER="${LATEST#v}"
              MAJOR=$(echo "$VER" | cut -d. -f1)
              MINOR=$(echo "$VER" | cut -d. -f2)
              PATCH=$(echo "$VER" | cut -d. -f3)
              VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"
            fi
            TAG="v${VERSION}"
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Version: ${VERSION}  Tag: ${TAG}"

      - name: Install build tools
        run: pip install build twine

      - name: Build sdist + wheel
        run: python -m build

      - name: Verify
        run: twine check dist/*

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*
          retention-days: 5

  # -----------------------------------------------------------------
  #  3. Tag + Release + Publish
  # -----------------------------------------------------------------
  release:
    name: Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Create tag
        if: startsWith(github.ref, 'refs/heads/')
        run: |
          TAG="${{ needs.build.outputs.tag }}"
          if git rev-parse "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists -- skipping"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag -a "${TAG}" -m "Release ${TAG}"
            git push origin "${TAG}"
            echo "Created tag ${TAG}"
          fi

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
        continue-on-error: true

      - name: Generate changelog
        id: changelog
        run: |
          TAG="${{ needs.build.outputs.tag }}"
          PREV_TAG=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | grep -v "^${TAG}$" | head -1)

          {
            echo "## What's Changed"
            echo ""
            if [ -n "$PREV_TAG" ]; then
              git log "${PREV_TAG}..HEAD" --pretty=format:"- %s (%h)" --no-merges 2>/dev/null | head -30 || true
            else
              echo "Initial release 🎉"
            fi
            echo ""
            echo ""
            echo "---"
            echo ""
            echo "### 📥 Install"
            echo '```bash'
            echo "pip install omnivector-embed==${{ needs.build.outputs.version }}"
            echo '```'
          } > /tmp/changelog.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build.outputs.tag }}
          name: "v${{ needs.build.outputs.version }}"
          body_path: /tmp/changelog.md
          draft: false
          prerelease: false
          files: dist/*
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
