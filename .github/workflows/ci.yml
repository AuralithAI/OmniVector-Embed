name: CI - Lint, Type Check, Test

on:
  push:
  pull_request:

jobs:
  format:
    name: Code Formatting (Black)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install black

      - name: Run black format check
        run: black --check src/ tests/

  lint:
    name: Lint & Format Check (Ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install ruff

      - name: Run ruff format check
        run: ruff format --check src/ tests/

      - name: Run ruff lint check
        run: ruff check src/ tests/

  type-check:
    name: Type Check (MyPy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install mypy pydantic "transformers==4.44.2" "peft==0.12.0" torch

      - name: Run mypy type check
        run: mypy src/omnivector/ --strict --no-error-summary 2>&1 | head -50 || true
        continue-on-error: true

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run unit tests
        run: |
          pytest tests/unit/ -v --cov=src/omnivector --cov-report=xml --tb=short

      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

  build:
    name: Build & Check Installation
    runs-on: ubuntu-latest
    needs: [format, lint, type-check, unit-tests]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install build tools
        run: pip install build wheel

      - name: Build package
        run: python -m build

      - name: Verify build artifacts
        run: |
          ls -lh dist/
          pip install dist/*.whl

      - name: Test import
        run: python -c "from omnivector import OmniVectorModel; print('Import successful')"
