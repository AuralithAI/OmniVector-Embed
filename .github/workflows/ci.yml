name: CI - Lint, Type Check, Test

on:
  push:
  pull_request:

jobs:
  cleanup-before:
    name: Free Up Disk Space
    runs-on: ubuntu-latest
    steps:
      - name: Clear disk space
        run: |
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/share/dotnet
          sudo docker image prune -a --force
          sudo apt-get clean
          sudo apt-get autoclean
          df -h
  format:
    name: Code Formatting (Black)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install black

      - name: Run black format check
        run: black --check src/ tests/

      - name: Cleanup after format check
        if: always()
        run: |
          pip cache purge
          rm -rf ~/.cache/pip || true
          python -c "import gc; gc.collect()"
          sudo apt-get clean
          df -h

  lint:
    name: Lint & Format Check (Ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install ruff

      - name: Run ruff format check
        run: ruff format --check src/ tests/

      - name: Run ruff lint check
        run: ruff check src/ tests/

      - name: Cleanup after lint check
        if: always()
        run: |
          pip cache purge
          rm -rf ~/.cache/pip || true
          python -c "import gc; gc.collect()"
          sudo apt-get clean
          df -h

  type-check:
    name: Type Check (MyPy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install mypy pydantic "transformers==4.44.2" "peft==0.12.0" torch

      - name: Run mypy type check
        run: mypy src/omnivector/ --strict --no-error-summary 2>&1 | head -50 || true
        continue-on-error: true

      - name: Cleanup after type check
        if: always()
        run: |
          pip cache purge
          rm -rf ~/.cache/pip || true
          rm -rf ~/.cache/torch || true
          python -c "import gc; gc.collect()"
          sudo apt-get clean
          df -h

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: cleanup-before
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies (CPU-only torch, minimal NVIDIA deps)
        run: |
          pip install --upgrade pip setuptools wheel
          # Install CPU-only torch to avoid NVIDIA libs (~1.5GB saved)
          pip install torch==2.3.1 --index-url https://download.pytorch.org/whl/cpu
          # Install package with test extras (no deepspeed)
          pip install -e ".[test]"

      - name: Check free space before tests
        run: df -h

      - name: Run unit tests
        run: |
          pytest tests/unit/ -v --cov=src/omnivector --cov-report=xml --tb=short

      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

      - name: Aggressive cleanup after tests
        if: always()
        run: |
          pip cache purge
          rm -rf ~/.cache/pip || true
          rm -rf ~/.cache/matplotlib || true
          rm -rf ~/.cache/torch || true
          python -c "import gc; gc.collect()"
          sudo apt-get clean
          sudo apt-get autoclean
          df -h

  build:
    name: Build & Check Installation
    runs-on: ubuntu-latest
    needs: [format, lint, type-check, unit-tests]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install build tools
        run: pip install build wheel

      - name: Build package
        run: python -m build

      - name: Verify build artifacts
        run: |
          ls -lh dist/
          pip install dist/*.whl

      - name: Test import
        run: python -c "from omnivector import OmniVectorModel; print('Import successful')"

      - name: Cleanup after build
        if: always()
        run: |
          pip cache purge
          rm -rf ~/.cache/pip || true
          python -c "import gc; gc.collect()"
          sudo apt-get clean
          df -h
