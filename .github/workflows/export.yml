name: Export - ONNX & Quantization

on:
  workflow_dispatch:
    inputs:
      checkpoint_path:
        description: "Path to checkpoint"
        required: true
      quantize_int8:
        description: "Apply int8 quantization"
        required: false
        default: "true"
      opset_version:
        description: "ONNX opset version (18+ required for PyTorch dynamo)"
        required: false
        default: "18"
  workflow_run:
    workflows: ["Evaluate - MTEB & Custom Assays"]
    types: [completed]

jobs:
  export:
    name: ONNX Export & Quantization
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Cache HuggingFace
        uses: actions/cache@v3
        with:
          path: ~/.cache/huggingface/
          key: hf-cache-${{ runner.os }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"
          pip install onnx onnxruntime optimum[onnxruntime]

      - name: Download checkpoint
        run: |
          mkdir -p checkpoints
          if [[ "${{ github.event.inputs.checkpoint_path }}" == *"/"* ]]; then
            cp -r "${{ github.event.inputs.checkpoint_path }}" checkpoints/model
          else
            pip install huggingface_hub
            python -c "
            from huggingface_hub import snapshot_download
            snapshot_download('${{ github.event.inputs.checkpoint_path }}', local_dir='checkpoints/model')
            "
          fi

      - name: Export to ONNX
        run: |
          python scripts/export_onnx.py \
            --model-path checkpoints/model \
            --output-dir exports/ \
            --opset-version ${{ github.event.inputs.opset_version }} \
            --optimize

      - name: Quantize to int8
        if: github.event.inputs.quantize_int8 == 'true'
        run: |
          python scripts/quantize_onnx.py \
            --onnx-path exports/omnivector_embed.onnx \
            --output-dir exports/

      - name: Validate ONNX parity
        run: |
          python scripts/validate_onnx.py \
            --pytorch-model checkpoints/model \
            --onnx-model exports/omnivector_embed.onnx \
            --num-samples 50 \
            --threshold 0.99

      - name: Calculate model size
        run: |
          echo "=== Model Sizes ===" | tee model_sizes.txt
          ls -lh exports/ | grep -E '\.onnx|\.bin' | tee -a model_sizes.txt

      - name: Create release artifacts
        run: |
          mkdir -p release_artifacts
          cp exports/omnivector_embed.onnx release_artifacts/ || true
          cp exports/omnivector_embed_int8.onnx release_artifacts/ || true
          cp model_sizes.txt release_artifacts/
          cd release_artifacts && sha256sum *.onnx > SHA256SUMS && cd ..

      - name: Upload artifacts
        uses: actions/upload-artifact@v3
        with:
          name: onnx-models
          path: release_artifacts/
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ github.ref }}
          body: |
            ## Export Summary

            - ONNX opset: ${{ github.event.inputs.opset_version }}
            - Int8 quantization: ${{ github.event.inputs.quantize_int8 }}
            - Model sizes in `model_sizes.txt`

      - name: Upload to HuggingFace Hub
        if: success()
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          pip install huggingface_hub
          python scripts/upload_to_hub.py \
            --repo-id omnivector/omnivector-embed-onnx \
            --onnx-path exports/omnivector_embed.onnx \
            --onnx-quantized-path exports/omnivector_embed_int8.onnx

      - name: Generate export report
        run: |
          python scripts/generate_export_report.py \
            --release-dir release_artifacts/ \
            --output-file export_report.md

      - name: Upload export report
        uses: actions/upload-artifact@v3
        with:
          name: export-report
          path: export_report.md

  validate-cpp:
    name: Validate C++ Inference (Optional)
    runs-on: ubuntu-latest
    needs: [export]
    if: false  # Enable when C++ tests available

    steps:
      - uses: actions/checkout@v4

      - name: Install ORT C++ SDK
        run: |
          wget https://github.com/microsoft/onnxruntime/releases/download/v1.18.0/onnxruntime-linux-x64-1.18.0.tgz
          tar xzf onnxruntime-linux-x64-1.18.0.tgz
          echo "ORT_HOME=$(pwd)/onnxruntime-linux-x64-1.18.0" >> $GITHUB_ENV

      - name: Build C++ smoke test
        run: |
          g++ -std=c++17 tests/cpp/smoke_test.cpp \
            -I${{ env.ORT_HOME }}/include \
            -L${{ env.ORT_HOME }}/lib \
            -lonnxruntime \
            -o smoke_test

      - name: Download ONNX model
        uses: actions/download-artifact@v3
        with:
          name: onnx-models

      - name: Run C++ inference test
        run: |
          LD_LIBRARY_PATH=${{ env.ORT_HOME }}/lib ./smoke_test \
            --model omnivector_embed_int8.onnx \
            --num_runs 10
